<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>App Center</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow-x: hidden;
        }
        
        .container { 
            max-width: 560px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 40px 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        h1 { 
            color: #1a1a2e;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .subtitle { 
            color: #666;
            font-size: 15px;
            font-weight: 400;
            line-height: 1.5;
        }
        
        .apps { 
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        
        @media (min-width: 480px) {
            .apps {
                grid-template-columns: 1fr 1fr;
            }
        }
        
        .app-link { 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 28px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
            cursor: pointer;
        }
        
        .app-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .app-link:hover::before {
            left: 100%;
        }
        
        .app-link:hover { 
            transform: translateY(-8px);
            box-shadow: 0 16px 40px rgba(102, 126, 234, 0.4);
        }
        
        .app-link:active {
            transform: translateY(-4px);
        }
        
        .icon { 
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        
        .info h3 { 
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }
        
        .info p { 
            font-size: 13px;
            font-weight: 400;
            opacity: 0.95;
            line-height: 1.4;
        }
        
        .note {
            margin-top: 20px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
        
        @media (max-width: 360px) {
            .container {
                padding: 32px 16px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            .app-link {
                padding: 24px 16px;
            }
            
            .icon {
                font-size: 40px;
                margin-bottom: 10px;
            }
        }
        
        @media (min-width: 768px) {
            .container {
                padding: 48px 40px;
            }
            
            h1 {
                font-size: 36px;
            }
            
            .app-link {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">💻</div>
            <h1>App Center</h1>
            <p class="subtitle">My personal web applications hub</p>
        </div>
        
        <div class="apps">
            <a href="javascript:alert('Todo App - Coming Soon!\n\n功能: 待办事项管理\n数据保存: 浏览器本地存储')" class="app-link">
                <div class="icon">📝</div>
                <div class="info">
                    <h3>Todo List</h3>
                    <p>Manage your daily tasks</p>
                </div>
            </a>
            
            <a href="javascript:alert('Translator App - Coming Soon!\n\n功能: 多语言翻译\n数据保存: 浏览器本地存储')" class="app-link">
                <div class="icon">🌐</div>
                <div class="info">
                    <h3>Translator</h3>
                    <p>Multi-language translator</p>
                </div>
            </a>
        </div>
        
        <div class="note">
            💡 All apps work locally without internet connection (data saved to browser)
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>App Center Launcher</title>
    <script>
        // 重定向到实际的应用
        window.location.replace('https://void123-0.github.io/apps/');
    </script>
</head>
<body>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #667eea; margin-bottom: 20px; }
        p { color: #666; font-size: 16px; line-height: 1.6; }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }
        a:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
    </style>
    
    <div class="container">
        <h1>🚀 App Center</h1>
        <p>正在加载应用...</p>
        <p style="font-size: 14px; color: #999;">如果页面没有自动跳转，请点击下方链接</p>
        <a href="https://void123-0.github.io/apps/">打开 App Center</a>
    </div>
</body>
</html>
